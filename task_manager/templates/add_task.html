<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
    <div class="relative overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <!-- Content -->
        <div class="relative z-10">
            <div class="container mx-auto px-4 py-12 max-w-2xl">
                <h2 class="text-4xl font-bold text-white mb-8 text-center animate-fade-in">Add New Task</h2>
                
                <form method="POST" class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-xl space-y-6 border border-white/20">
                    <div class="space-y-2">
                        <label for="title" class="block text-lg font-medium text-white">Task Title</label>
                        <input type="text" name="title" id="title" placeholder="Enter task title" required 
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50
                            focus:ring-2 focus:ring-cyan-300 focus:border-transparent transition-all duration-300">
                    </div>

                    <div class="space-y-2">
                        <label for="description" class="block text-lg font-medium text-white">Task Description</label>
                        <textarea name="description" id="description" placeholder="Enter task description" required 
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50
                            focus:ring-2 focus:ring-cyan-300 focus:border-transparent transition-all duration-300 h-32"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label for="due_date" class="block text-lg font-medium text-white">Due Date</label>
                        <input type="datetime-local" name="due_date" id="due_date" required 
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white
                            focus:ring-2 focus:ring-cyan-300 focus:border-transparent transition-all duration-300">
                    </div>

                    <button type="submit" 
                        class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-white py-3 px-6 rounded-xl
                        hover:from-emerald-500 hover:to-teal-600 transform hover:scale-105 transition-all duration-300 
                        font-semibold text-lg shadow-lg shadow-emerald-500/30">
                        Create Task
                    </button>
                </form>

                <div class="text-center mt-8">
                    <a href="/teacher" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Teacher Portal
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
