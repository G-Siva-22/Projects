<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
    <div class="relative overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-green-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <!-- Content -->
        <div class="relative z-10">
            <div class="container mx-auto px-4 py-12 max-w-3xl">
                <h1 class="text-4xl font-bold text-white mb-8 text-center animate-fade-in">Ask Your Teacher</h1>
                
                <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-xl border border-white/20">
                    <div class="space-y-6">
                        <div class="space-y-4">
                            <textarea 
                                id="question" 
                                placeholder="Type or speak your question..." 
                                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50
                                    focus:ring-2 focus:ring-green-300 focus:border-transparent transition-all duration-300 h-32 resize-none"
                            ></textarea>
                        </div>

                        <div class="flex gap-4">
                            <button 
                                onclick="askTeacher()" 
                                class="flex-1 bg-gradient-to-r from-green-400 to-teal-500 text-white py-3 px-6 rounded-xl
                                    hover:from-green-500 hover:to-teal-600 transform hover:scale-105 transition-all duration-300 
                                    font-semibold text-lg shadow-lg shadow-green-500/30 flex items-center justify-center gap-2"
                            >
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                                </svg>
                                Ask
                            </button>
                            <button 
                                onclick="startListening()" 
                                class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-500 text-white py-3 px-6 rounded-xl
                                    hover:from-teal-500 hover:to-emerald-600 transform hover:scale-105 transition-all duration-300 
                                    font-semibold text-lg shadow-lg shadow-teal-500/30 flex items-center justify-center gap-2"
                            >
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                                </svg>
                                Speak
                            </button>
                        </div>

                        <div id="response" class="mt-8 p-6 bg-white/5 rounded-xl border border-white/10 text-white/90 min-h-[100px] hidden"></div>
                        <audio id="audioPlayer" controls class="w-full mt-4 hidden"></audio>
                    </div>
                </div>

                <div class="text-center mt-8">
                    <a href="/" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Home
                    </a>   
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>

    <script>
        function askTeacher() {
            const question = document.getElementById('question').value;
            const responseDiv = document.getElementById('response');
            responseDiv.classList.remove('hidden');
            responseDiv.innerHTML = 'Processing your question...';
            
            fetch('/ask_teacher', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question })
            })
            .then(response => response.json())
            .then(data => {
                responseDiv.innerHTML = data.response;
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.src = data.audio;
                audioPlayer.classList.remove('hidden');
            });
        }

        function startListening() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = () => {
                    document.getElementById('question').placeholder = 'Listening...';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('question').value = transcript;
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    document.getElementById('question').placeholder = 'Type or speak your question...';
                };

                recognition.onend = () => {
                    document.getElementById('question').placeholder = 'Type or speak your question...';
                };

                recognition.start();
            } else {
                alert('Speech recognition is not supported in your browser.');
            }
        }
    </script>
</body>
</html>
