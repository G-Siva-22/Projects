<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 via-indigo-600 to-violet-700 min-h-screen">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <h1 class="text-4xl font-bold text-white mb-12 text-center animate-fade-in">Teacher Task Manager</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <a href="/add" class="group transform hover:scale-105 transition-all duration-300 ease-in-out">
                <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 text-center border border-white/20 group-hover:bg-white/20 transition-all duration-300">
                    <div class="h-14 w-14 bg-gradient-to-br from-emerald-400 to-teal-300 rounded-full mx-auto mb-4 group-hover:scale-110 transition-transform duration-300 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-semibold text-white mb-3">Add Task</h2>
                    <p class="text-white/80">Create and assign new tasks to students</p>
                </div>
            </a>
            <a href="/view" class="group transform hover:scale-105 transition-all duration-300 ease-in-out">
                <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 text-center border border-white/20 group-hover:bg-white/20 transition-all duration-300">
                    <div class="h-14 w-14 bg-gradient-to-br from-amber-400 to-orange-300 rounded-full mx-auto mb-4 group-hover:scale-110 transition-transform duration-300 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-semibold text-white mb-3">View Tasks</h2>
                    <p class="text-white/80">Browse and manage existing assignments</p>
                </div>
            </a>
        </div>
        <div class="text-center mt-12">
            <a href="/" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
