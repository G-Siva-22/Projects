<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
    <div class="relative overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-violet-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <!-- Content -->
        <div class="relative z-10">
            <div class="container mx-auto px-4 py-12">
                <h1 class="text-4xl font-bold text-white mb-12 text-center animate-fade-in">Student Portal</h1>
                
                <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3 max-w-7xl mx-auto">
                    {% for task in tasks %}
                    <div class="group">
                        <div class="relative bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20 
                                    transform hover:scale-105 transition-all duration-500">
                            <div class="absolute inset-0 bg-gradient-to-r from-violet-500/20 to-indigo-500/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <div class="relative z-10">
                                <h3 class="text-2xl font-bold text-white mb-4">{{ task.title }}</h3>
                                <p class="text-white/80 mb-4">{{ task.description }}</p>
                                <p class="text-white/70 mb-6">
                                    <span class="font-medium">Due:</span> {{ task.due_date }}
                                </p>
                                {% if task.status == "Completed" %}
                                <div class="space-y-4">
                                    <p class="text-emerald-300 font-medium flex items-center">
                                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                        </svg>
                                        Submitted Successfully
                                    </p>
                                    <a href="{{ url_for('uploaded_file', filename=task.submission) }}" 
                                        class="inline-flex items-center text-cyan-300 hover:text-cyan-200 transition-colors duration-300" target="_blank">
                                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                        </svg>
                                        View Submission
                                    </a>
                                </div>
                                {% else %}
                                <form action="/student" method="POST" enctype="multipart/form-data" class="space-y-4">
                                    <input type="hidden" name="task_title" value="{{ task.title }}">
                                    <div class="space-y-2">
                                        <label class="block text-lg font-medium text-white">Upload PDF Submission</label>
                                        <input type="file" name="file" accept="application/pdf" required
                                            class="block w-full text-white/80 file:mr-4 file:py-2 file:px-4
                                            file:rounded-full file:border-0 file:text-sm file:font-semibold
                                            file:bg-white/10 file:text-white hover:file:bg-white/20
                                            transition-all duration-300">
                                    </div>
                                    <button type="submit" 
                                        class="w-full bg-gradient-to-r from-violet-400 to-indigo-500 text-white py-3 px-6 rounded-xl
                                        hover:from-violet-500 hover:to-indigo-600 transform hover:scale-105 transition-all duration-300 
                                        font-semibold shadow-lg shadow-violet-500/30">
                                        Submit Work
                                    </button>
                                </form>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="text-center mt-12">
                    <a href="/" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
