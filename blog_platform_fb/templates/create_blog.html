{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto p-6 my-12">
    <div class="bg-white rounded-2xl shadow-xl p-8 scale-hover animate__animated animate__fadeInUp">
        <!-- Enhanced Title -->
        <h1 class="text-3xl font-bold mb-8 gradient-text flex items-center space-x-3">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            <span>Create New Blog</span>
        </h1>

        <!-- Enhanced Form -->
        <form action="{{ url_for('create_blog') }}" method="POST" enctype="multipart/form-data" class="space-y-6 animate__animated animate__fadeIn animate__delay-1s">
            <!-- Title Input -->
            <div class="space-y-2 group">
                <label for="title" class="block text-lg font-medium text-gray-700 group-hover:text-indigo-600 transition-colors duration-300">Title</label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    required 
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all duration-300"
                    placeholder="Enter your blog title..."
                >
                <div class="h-0.5 w-0 group-hover:w-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500"></div>
            </div>

            <!-- Content Input -->
            <div class="space-y-2 group">
                <label for="content" class="block text-lg font-medium text-gray-700 group-hover:text-indigo-600 transition-colors duration-300">Content</label>
                <textarea 
                    id="content" 
                    name="content" 
                    required 
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all duration-300 resize-none"
                    rows="8"
                    placeholder="Write your blog content here..."
                ></textarea>
                <div class="h-0.5 w-0 group-hover:w-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500"></div>
            </div>

            <!-- Enhanced File Upload -->
            <div class="space-y-2">
                <label for="image" class="block text-lg font-medium text-gray-700">Upload Image</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl group hover:border-indigo-500 transition-all duration-300">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-indigo-500 transition-colors duration-300" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600">
                            <label for="image" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                <span class="hover:underline">Upload a file</span>
                                <input id="image" name="image" type="file" class="sr-only">
                            </label>
                            <p class="pl-1">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
                    </div>
                </div>
            </div>

            <!-- Enhanced Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-medium py-3 px-6 rounded-xl shadow-md hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300 group"
            >
                <span class="flex items-center justify-center space-x-2">
                    <svg class="w-5 h-5 transform group-hover:rotate-12 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>Create Blog</span>
                </span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
