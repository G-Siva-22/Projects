<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-slate-50 font-sans min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-indigo-700 mb-2">AI Teacher Assistant</h1>
            <p class="text-slate-600">Ask any question and get instant help from your virtual teacher</p>
        </header>

        <main class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div id="conversation-container" class="h-80 md:h-96 overflow-y-auto p-6 space-y-4">
                <div class="teacher-message">
                    <div class="flex items-start gap-3">
                        <div class="teacher-avatar flex-shrink-0">
                            <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                </svg>
                            </div>
                        </div>
                        <div class="message-bubble bg-indigo-50 p-4 rounded-lg rounded-tl-none max-w-[85%]">
                            <p class="text-slate-700">Hello! I'm your AI Teacher Assistant. How can I help you today?</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="audio-player-container hidden p-4 bg-indigo-50 border-t border-indigo-100">
                <div class="flex items-center gap-3">
                    <button id="play-pause-btn" class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center hover:bg-indigo-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <div class="flex-grow">
                        <div class="text-xs text-indigo-800 mb-1 font-medium">Teacher's Voice</div>
                        <div class="audio-progress-container h-2 bg-indigo-200 rounded-full overflow-hidden">
                            <div id="audio-progress" class="h-full bg-indigo-600 w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
                <audio id="audio-player" src=""></audio>
            </div>

            <div class="question-input-container p-4 border-t border-slate-200">
                <form id="question-form" class="flex gap-2">
                    <input 
                        type="text" 
                        id="question-input" 
                        placeholder="Ask your question..." 
                        class="flex-grow py-3 px-4 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                        required
                    >
                    <button 
                        type="submit" 
                        class="ask-button bg-indigo-600 text-white py-3 px-6 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all flex items-center gap-2"
                    >
                        <span>Ask</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
