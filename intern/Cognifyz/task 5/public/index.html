<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #818cf8;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --warning: #f59e0b;
      --warning-hover: #d97706;
      --success: #10b981;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f6f8ff 0%, #f0f4ff 100%);
      min-height: 100vh;
      padding: 2rem 0;
      color: var(--text-primary);
    }

    .container {
      max-width: 1000px;
    }

    .dashboard-card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .dashboard-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    h2 {
      font-weight: 800;
      margin-bottom: 2.5rem;
      font-size: 2.25rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }

    .form-control {
      border: 2px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      transition: all 0.3s ease;
      background-color: var(--background);
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      background-color: var(--card-bg);
    }

    .btn {
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-hover), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }

    .btn-warning {
      background: var(--warning);
      border: none;
      color: white;
    }

    .btn-warning:hover {
      background: var(--warning-hover);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger);
      border: none;
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      transform: translateY(-1px);
    }

    .user-card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      border: 2px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .user-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .user-info {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .info-group {
      flex: 1;
      min-width: 200px;
    }

    .info-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }

    .info-value {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 1.1rem;
    }

    .timestamp {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 0.75rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    .toast-container {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 1000;
    }

    .custom-toast {
      background: white;
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toast-success {
      border-left: 4px solid var(--success);
    }

    .toast-error {
      border-left: 4px solid var(--danger);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 500px;
      margin: 2rem auto;
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(1rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .dashboard-card {
        padding: 1.5rem;
      }

      h2 {
        font-size: 1.75rem;
      }

      .user-card {
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dashboard-card">
      <h2>User Management Dashboard</h2>

      <form id="userForm" class="mb-4">
        <div class="row g-3">
          <div class="col-md-5">
            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
          </div>
          <div class="col-md-5">
            <input type="email" id="email" class="form-control" placeholder="Enter email address" required>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Add User</button>
          </div>
        </div>
      </form>

      <div id="userList"></div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3 class="mb-4">Edit User</h3>
      <form id="editForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="editUsername" class="form-control" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Email</label>
          <input type="email" id="editEmail" class="form-control" required>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">Save Changes</button>
          <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `custom-toast toast-${type}`;
      toast.innerHTML = message;
      
      const container = document.getElementById('toastContainer');
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showModal(user) {
      const modal = document.getElementById('editModal');
      const username = document.getElementById('editUsername');
      const email = document.getElementById('editEmail');
      
      username.value = user.username;
      email.value = user.email;
      modal.dataset.userId = user.id;
      
      modal.style.display = 'block';
      username.focus();
    }

    function closeModal() {
      const modal = document.getElementById('editModal');
      modal.style.display = 'none';
    }

    async function fetchUsers() {
      try {
        const response = await fetch('/api/users');
        const users = await response.json();
        const userList = document.getElementById('userList');
        userList.innerHTML = '';
        
        users.forEach(user => {
          const userCard = document.createElement('div');
          userCard.className = 'user-card';
          userCard.innerHTML = `
            <div class="user-info">
              <div class="info-group">
                <div class="info-label">Username</div>
                <div class="info-value">${user.username}</div>
              </div>
              <div class="info-group">
                <div class="info-label">Email</div>
                <div class="info-value">${user.email}</div>
              </div>
            </div>
            <div class="timestamp">
              Created: ${formatDate(user.createdAt)}
              ${user.updatedAt ? `<br>Updated: ${formatDate(user.updatedAt)}` : ''}
            </div>
            <div class="actions mt-3">
              <button class="btn btn-warning" onclick="editUser(${user.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteUser(${user.id})">Delete</button>
            </div>
          `;
          userList.appendChild(userCard);
        });
      } catch (error) {
        showToast('Failed to fetch users', 'error');
      }
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;

      try {
        const response = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error);
        }

        await fetchUsers();
        e.target.reset();
        showToast('User added successfully');
      } catch (error) {
        showToast(error.message, 'error');
      }
    });

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = e.target.closest('.modal').dataset.userId;
      const username = document.getElementById('editUsername').value;
      const email = document.getElementById('editEmail').value;

      try {
        const response = await fetch(`/api/users/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error);
        }

        closeModal();
        await fetchUsers();
        showToast('User updated successfully');
      } catch (error) {
        showToast(error.message, 'error');
      }
    });

    async function editUser(id) {
      try {
        const response = await fetch(`/api/users/${id}`);
        const user = await response.json();
        showModal(user);
      } catch (error) {
        showToast('Failed to fetch user details', 'error');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;

      try {
        const response = await fetch(`/api/users/${id}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error);
        }

        await fetchUsers();
        showToast('User deleted successfully');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    // Close modal when clicking outside
    window.onclick = (event) => {
      const modal = document.getElementById('editModal');
      if (event.target === modal) {
        closeModal();
      }
    };

    fetchUsers();
  </script>
</body>
</html>
