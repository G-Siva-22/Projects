<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stunning Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradient-shift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .dynamic-bg {
      background: linear-gradient(270deg, #1e3a8a, #3b82f6, #60a5fa, #0ea5e9, #0d9488);
      background-size: 200% 200%;
      animation: gradient-shift 6s ease infinite;
    }
  </style>
</head>
<body class="dynamic-bg min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8 bg-gray-800/90 rounded-lg shadow-lg">
    <h1 class="text-4xl font-bold text-center text-white mb-6">Welcome Back</h1>

    <form id="loginForm" class="space-y-6">
      <div>
        <label for="email" class="block text-lg font-semibold text-gray-300">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email"
          class="w-full mt-2 px-4 py-3 bg-gray-700 text-gray-200 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-500">
      </div>

      <div>
        <label for="password" class="block text-lg font-semibold text-gray-300">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"
          class="w-full mt-2 px-4 py-3 bg-gray-700 text-gray-200 rounded-lg focus:outline-none focus:ring-4 focus:ring-teal-500">
      </div>

      <button type="submit"
        class="w-full py-3 px-6 text-lg font-semibold text-white bg-gradient-to-r from-blue-600 to-teal-500 rounded-lg hover:scale-105 transform transition-transform duration-300 focus:outline-none focus:ring-4 focus:ring-teal-300">Sign In</button>
    </form>

    <p class="mt-4 text-center text-gray-400">
      Don’t have an account? <a href="#" class="font-semibold text-teal-400 hover:underline">Sign up</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please fill in all fields!');
        return;
      }

      alert('Login Successful! Welcome!');
    });
  </script>
</body>
</html>
