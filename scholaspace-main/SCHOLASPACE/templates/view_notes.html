<!-- templates/view_notes.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploaded Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
    <div class="relative overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <div class="relative z-10">
            <div class="container mx-auto px-4 py-12 max-w-3xl">
                <h1 class="text-4xl font-bold text-white text-center mb-10 animate-fade-in">Uploaded Notes with Video</h1>

                {% for note in notes %}
                <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-xl border border-white/20 text-white p-6 mb-8">
                    <h2 class="text-xl font-semibold mb-2">{{ note.subject }} - {{ note.topic }}</h2>
                    
                    <p class="mb-2">
                        <span class="font-medium">File:</span> 
                        <a href="{{ url_for('rhyme.serve_note_file', filename=note.file) }}" target="_blank" class="text-cyan-300 hover:text-cyan-500">
                            {{ note.file }}
                        </a>
                    </p>
                    
                    <p class="mb-4">
                        <span class="font-medium">YouTube Link:</span>
                        <a href="{{ note.yt_link }}" target="_blank" class="text-cyan-300 hover:text-cyan-500">
                            {{ note.yt_link }}
                        </a>
                    </p>

                    {% if 'youtube.com' in note.yt_link or 'youtu.be' in note.yt_link %}
                    <div class="aspect-w-16 aspect-h-9 mb-4">
                        <iframe class="rounded-lg w-full h-64" 
                                src="https://www.youtube.com/embed/{{ note.yt_link | replace('https://youtu.be/', '') | replace('https://www.youtube.com/watch?v=', '') }}"
                                frameborder="0" allowfullscreen></iframe>
                    </div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="text-center mt-8">
                    <a href="{{ url_for('rhyme.upload') }}" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Upload More Notes
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
