<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
    <div class="relative overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <!-- Content -->
        <div class="relative z-10">
            <div class="container mx-auto px-4 py-12">
                <h1 class="text-4xl font-bold text-white mb-8 text-center animate-fade-in">Teacher Portal</h1>
                
                <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                    <a href="/add1" class="group">
                        <div class="relative bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 
                                    hover:bg-white/20 transition-all duration-500 transform hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <div class="relative z-10">
                                <div class="h-14 w-14 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-xl mx-auto mb-6 
                                            transform group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 
                                            shadow-lg shadow-emerald-500/30 flex items-center justify-center">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                    </svg>
                                </div>
                                <h2 class="text-2xl font-bold text-white mb-3 text-center">Add Task</h2>
                                <p class="text-white/80 text-center">Create new assignments with our intuitive interface</p>
                            </div>
                        </div>
                    </a>

                    <a href="/view" class="group">
                        <div class="relative bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 
                                    hover:bg-white/20 transition-all duration-500 transform hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-r from-amber-500/20 to-orange-500/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <div class="relative z-10">
                                <div class="h-14 w-14 bg-gradient-to-br from-amber-400 to-orange-500 rounded-xl mx-auto mb-6 
                                            transform group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 
                                            shadow-lg shadow-amber-500/30 flex items-center justify-center">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    </svg>
                                </div>
                                <h2 class="text-2xl font-bold text-white mb-3 text-center">View Tasks</h2>
                                <p class="text-white/80 text-center">Review and manage all created assignments</p>
                            </div>
                        </div>
                    </a>

                    <a href="/progress" class="md:col-span-2 group">
                        <div class="relative bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 
                                    hover:bg-white/20 transition-all duration-500 transform hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-r from-purple-500/20 to-pink-500/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <div class="relative z-10">
                                <div class="h-14 w-14 bg-gradient-to-br from-purple-400 to-pink-500 rounded-xl mx-auto mb-6 
                                            transform group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 
                                            shadow-lg shadow-purple-500/30 flex items-center justify-center">
                                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                                    </svg>
                                </div>
                                <h2 class="text-2xl font-bold text-white mb-3 text-center">View Progress</h2>
                                <p class="text-white/80 text-center">Track student submissions and monitor overall progress</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="text-center mt-12">
                    <a href="/teachers/teachers1" class="inline-flex items-center text-white/90 hover:text-white transition-colors duration-300">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
