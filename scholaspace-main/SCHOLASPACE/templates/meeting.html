<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Classroom & Meeting Room</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #072055; /* New background color */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .classroom-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            border-radius: 10px;
            padding: 20px;
            background-color: #0f6cbe; /* New background color */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #a5d5f8; /* Light blue */
        }

        #video-container {
            flex: 2;
            margin-right: 20px;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid #3ea6f2; /* Blue-green */
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            transition: background-color 0.3s ease;
        }

        button#toggleCamera {
            background-color: #3ea6f2; /* Blue-green */
            color: white;
        }

        button#toggleCamera:hover {
            background-color: #0f6cbe; /* Darker blue */
        }

        button#audioToggle {
            background-color: #1D4ED8; /* Blue */
            color: white;
        }

        button#audioToggle:hover {
            background-color: #2563EB; /* Darker blue */
        }

        button#leaveMeeting {
            background-color: #EF4444; /* Red */
            color: white;
        }

        button#leaveMeeting:hover {
            background-color: #DC2626; /* Darker red */
        }

        #chat-box {
            flex: 1;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            border: 2px solid #1D4ED8; /* Blue */
        }

        #chat-box ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #chat-box ul li {
            background-color: #F3F4F6; /* Light gray */
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #message {
            width: calc(100% - 100px);
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #E5E7EB; /* Light gray */
            background-color: #F9FAFB; /* Light gray */
            color: #333;
        }

        #sendButton {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            background-color: #3ea6f2; /* Blue-green */
            color: white;
            border: none;
            transition: background-color 0.3s ease;
        }

        #sendButton:hover {
            background-color: #0f6cbe; /* Darker blue */
        }

        @media (max-width: 768px) {
            .classroom-container {
                flex-direction: column;
                height: auto;
            }

            #video-container {
                width: 100%;
                margin-bottom: 20px;
            }

            #chat-box {
                width: 100%;
                height: 300px;
            }

            #message {
                width: calc(100% - 80px);
            }

            .controls button {
                font-size: 14px;
                padding: 8px 16px;
            }

            h1 {
                font-size: 24px;
            }

            video {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="classroom-container">
        <div id="video-container">
            <h1>Welcome to the Virtual Classroom, <span id="username-placeholder"></span>!</h1>
            <video id="localVideo" autoplay muted></video>
            <div class="controls">
                <button id="toggleCamera">Toggle Camera</button>
                <button id="audioToggle">Audio On</button>
                <button id="leaveMeeting">Leave Meeting</button>
            </div>
        </div>
        <div id="chat-box">
            <ul id="messages"></ul>
            <input id="message" type="text" placeholder="Enter your message...">
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.1/socket.io.min.js"></script>
    <script>
        const localVideo = document.getElementById('localVideo');
        const toggleCameraBtn = document.getElementById('toggleCamera');
        const audioToggleBtn = document.getElementById('audioToggle');
        const usernamePlaceholder = document.getElementById('username-placeholder');
        const room = prompt("Enter room name:");
        const username = prompt("Enter your name:");
        usernamePlaceholder.textContent = username;

        let videoStream;
        let audioStream;
        let isCameraOn = false;
        let isAudioOn = true;

        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                localVideo.srcObject = videoStream;
                isCameraOn = true;
                toggleCameraBtn.innerText = 'Turn Camera Off';
            } catch (error) {
                console.error('Error accessing camera:', error);
                alert('Unable to access camera. Please allow permissions.');
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
                isCameraOn = false;
                toggleCameraBtn.innerText = 'Turn Camera On';
            }
        }

        async function startAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioStream.getAudioTracks()[0].enabled = isAudioOn;
            } catch (error) {
                console.error('Error accessing audio:', error);
            }
        }

        function toggleAudio() {
            if (audioStream) {
                isAudioOn = !isAudioOn;
                audioStream.getAudioTracks()[0].enabled = isAudioOn;
                audioToggleBtn.innerText = isAudioOn ? 'Audio On' : 'Audio Off';
            } else {
                startAudio();
            }
        }

        toggleCameraBtn.addEventListener('click', () => {
            if (isCameraOn) {
                stopCamera();
            } else {
                startCamera();
            }
        });

        audioToggleBtn.addEventListener('click', toggleAudio);

        document.getElementById('leaveMeeting').addEventListener('click', () => {
            stopCamera();
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
            socket.emit('leave', { room: room, username: username });
            window.location.href = '/';
        });

        const socket = io();
        socket.emit('join', { room: room, username: username });

        socket.on('message', function (msg) {
            let li = document.createElement('li');
            li.textContent = msg;
            document.getElementById('messages').appendChild(li);
        });

        function sendMessage() {
            const message = document.getElementById('message').value;
            socket.emit('message', { room: room, username: username, message: message });
            document.getElementById('message').value = '';
        }

        window.onbeforeunload = function () {
            socket.emit('leave', { room: room, username: username });
        };
    </script>
</body>
</html>
