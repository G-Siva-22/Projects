<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Portal - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">

    <div class="relative overflow-hidden">
        <!-- Background Blobs -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 -left-4 w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 -right-4 w-72 h-72 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
            <div class="absolute -bottom-8 left-20 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
        </div>

        <!-- Foreground Content -->
        <div class="relative z-10">
            <div class="container mx-auto px-4 py-24 max-w-2xl text-center">
                <h1 class="text-5xl font-extrabold text-white mb-10 animate-fade-in hover:scale-105 transition-transform duration-300">
                    📚 Welcome to Notes Portal
                </h1>

                <div class="space-y-6">
                    <!-- Upload Notes Button -->
                    <a href="{{ url_for('rhyme.upload') }}" 
                       class="inline-flex items-center justify-center bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white py-3 px-8 rounded-xl text-lg font-semibold shadow-lg transform hover:scale-105 transition-all duration-300">
                        ✏️ Upload Notes
                    </a>

                    <!-- View Notes Table
                    <a href="{{ url_for('rhyme.notes') }}" 
                       class="inline-flex items-center justify-center bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white py-3 px-8 rounded-xl text-lg font-semibold shadow-lg transform hover:scale-105 transition-all duration-300">
                        📂 View Notes Table
                    </a> -->

                    <!-- View Notes with YouTube -->
                    <a href="{{ url_for('rhyme.preview_notes') }}" 
                       class="inline-flex items-center justify-center bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white py-3 px-8 rounded-xl text-lg font-semibold shadow-lg transform hover:scale-105 transition-all duration-300">
                        🎥 View Notes with YouTube
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }
    </style>
</body>
</html>
