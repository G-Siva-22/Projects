<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} My Website {% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #072055;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background-color: #0f6cbe;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .form-container {
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            color: #a5d5f8;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #a5d5f8;
            background-color: #a5d5f8;
            color: #072055;
        }

        .btn {
            background-color: #3ea6f2;
            color: #072055;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #a5d5f8;
            color: #072055;
        }

        .error {
            color: #ff4d4d;
            font-size: 0.8rem;
        }

        .meeting-container {
            text-align: center;
        }

        .video-placeholder {
            background-color: #a5d5f8;
            padding: 50px;
            margin: 20px 0;
            border-radius: 10px;
            color: #072055;
        }

        .link {
            color: #3ea6f2;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
            color: #a5d5f8;
        }

        .meeting-list {
            list-style-type: none;
            padding: 0;
        }

        .meeting-list li {
            margin: 10px 0;
            color: #ffffff;
        }

        /* Bootstrap override for the card */
        .card.bg-dark {
            background-color: #0f6cbe !important;
            color: #a5d5f8;
        }
    </style>
</head>

<body>
<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card bg-dark text-white" style="border-radius: 1rem;">
          <div class="card-body p-5 text-center">
              {% block content %}{% endblock %}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
