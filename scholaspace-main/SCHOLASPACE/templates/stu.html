<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="font-[Inter] bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen">
  <div class="relative overflow-hidden">
    <!-- Background Blobs -->
    <div class="absolute inset-0 z-0">
      <div class="absolute top-0 -left-4 w-72 h-72 bg-violet-500 rounded-full blur-3xl opacity-20 animate-blob"></div>
      <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
      <div class="absolute -bottom-8 left-20 w-72 h-72 bg-purple-500 rounded-full blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10">
      <div class="container mx-auto px-4 py-12">
        <h1 class="text-4xl font-bold text-white mb-12 text-center animate-fade-in">Student Portal</h1>

        <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3 max-w-7xl mx-auto">
          {% for task in tasks %}
          <div class="group">
            <div class="relative bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20 transition-all duration-500 hover:scale-105">
              <div class="absolute inset-0 bg-gradient-to-r from-violet-500/20 to-indigo-500/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
              <div class="relative z-10">
                <h3 class="text-2xl font-bold text-white mb-2">{{ task.title }}</h3>
                <p class="text-white/80 mb-2">{{ task.description }}</p>
                <p class="text-white/70 mb-4"><span class="font-medium">Due:</span> {{ task.due_date }}</p>

                {% if task.status == "Completed" %}
                <div class="space-y-3">
                  <p class="text-green-300 font-medium flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Submitted Successfully
                  </p>
                  <a href="{{ url_for('stu.uploaded_file', filename=task.submission) }}" target="_blank"
                     class="text-cyan-300 hover:text-cyan-100 flex items-center space-x-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    <span>View Submission</span>
                  </a>
                </div>
                {% else %}
                <form action="/stu/stupo" method="POST" enctype="multipart/form-data">

                  <input type="hidden" name="task_title" value="{{ task.title }}">
                  <div>
                    <label class="block text-white mb-2">Upload PDF</label>
                    <input type="file" name="file" accept="application/pdf" required
                           class="block w-full text-white file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-white/10 file:text-white hover:file:bg-white/20 transition">
                  </div>
                  <button type="submit"
                          class="w-full bg-gradient-to-r from-violet-500 to-indigo-500 text-white py-2 px-4 rounded-xl hover:from-violet-600 hover:to-indigo-600 transition font-semibold">
                    Submit
                  </button>
                </form>
                {% endif %}
              </div>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <!-- Tailwind animation -->
  <style>
    @keyframes blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    .animate-blob {
      animation: blob 7s infinite;
    }
    .animation-delay-2000 {
      animation-delay: 2s;
    }
    .animation-delay-4000 {
      animation-delay: 4s;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 1s ease-out forwards;
    }
  </style>
</body>
</html>
