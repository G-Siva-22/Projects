<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        
        .upload-area {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' stroke='%23A5B4FC' stroke-width='2' stroke-dasharray='8%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }

        .gradient-border {
            position: relative;
            border-radius: 0.75rem;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 0.85rem;
            padding: 2px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6, #d946ef);
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .animated-gradient {
            background: linear-gradient(-45deg, #6366f1, #8b5cf6, #d946ef, #6366f1);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .table-container {
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #8b5cf6 #f3f4f6;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f3f4f6;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #7c3aed;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hover-cell {
            transition: all 0.2s ease;
        }

        .hover-cell:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }

        .tooltip {
            position: relative;
        }

        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
    <!-- Background Pattern -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(circle_500px_at_50%_200px,#e5e7eb,transparent)]"></div>
        <div class="absolute inset-0 opacity-30 animated-gradient"></div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-transparent bg-clip-text mb-6">
                CSV Data Viewer
            </h1>
            <p class="text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed">
                Transform your CSV data into an interactive, editable table with our elegant viewer
            </p>
        </div>

        <!-- Main Content -->
        <div class="space-y-8">
            <!-- Upload Section -->
            <div class="glass-effect rounded-2xl shadow-xl p-8 border border-white/20">
                <div class="space-y-8">
                    <h2 class="text-2xl font-semibold text-gray-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        Upload Your CSV File
                    </h2>

                    <!-- Upload Area -->
                    <div class="upload-area relative rounded-xl p-12 transition-all duration-300 hover:scale-[1.01] group">
                        <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="text-center space-y-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto text-indigo-500 group-hover:text-indigo-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <div>
                                <p class="text-lg font-medium text-gray-700">Drop your file here or click to browse</p>
                                <p class="text-sm text-gray-500 mt-1">CSV files only</p>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button id="uploadButton" class="gradient-border bg-white hover:bg-gray-50 text-gray-800 px-6 py-3 rounded-lg font-semibold transition-all duration-300 hover:shadow-lg group">
                            <span class="flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-600 group-hover:text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                </svg>
                                Upload and Display
                            </span>
                        </button>
                        <button id="surfacePlotButton" disabled class="gradient-border bg-white text-gray-800 px-6 py-3 rounded-lg font-semibold transition-all duration-300 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed group">
                            <span class="flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-600 group-hover:text-purple-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
                                </svg>
                                3D Surface Plot
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table Container -->
            <div id="table-container" class="glass-effect rounded-2xl shadow-xl overflow-hidden border border-white/20">
                <!-- Table will be dynamically populated here -->
            </div>

            <!-- Save Button -->
            <div class="text-center">
                <button id="saveButton" class="gradient-border bg-white hover:bg-gray-50 text-gray-800 px-8 py-3 rounded-lg font-semibold transition-all duration-300 hover:shadow-lg inline-flex items-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-pink-600 group-hover:text-pink-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        let tableData = [];

        // Event listener for file upload button
        document.getElementById("uploadButton").addEventListener("click", function () {
            const fileInput = document.getElementById("csvFile");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a CSV file to upload.");
                return;
            }

            const formData = new FormData();
            formData.append("csvfile", file);

            fetch("/upload", {
                method: "POST",
                body: formData
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to upload file");
                    }
                    return response.json();
                })
                .then(data => {
                    const header = data.header;
                    const rows = data.data;
                    tableData = rows;

                    let tableHtml = `
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200/50">
                                <thead>
                                    <tr class="bg-gray-900/5">`;

                    header.forEach(col => {
                        tableHtml += `
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                ${col}
                            </th>`;
                    });

                    tableHtml += `
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-200/50">`;

                    rows.forEach((row, rowIndex) => {
                        tableHtml += `
                            <tr class="transition-colors hover:bg-gray-900/5">`;
                        row.forEach((col, colIndex) => {
                            tableHtml += `
                                <td contenteditable="true"
                                    data-row="${rowIndex}"
                                    data-col="${colIndex}"
                                    class="px-6 py-4 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white rounded-lg transition-all">
                                    ${col}
                                </td>`;
                        });
                        tableHtml += `
                            </tr>`;
                    });

                    tableHtml += `
                                </tbody>
                            </table>
                        </div>`;

                    document.getElementById("table-container").innerHTML = tableHtml;
                    document.getElementById("surfacePlotButton").disabled = false;
                })
                .catch(error => {
                    alert("Error uploading file: " + error.message);
                });
        });

        // Event listener for surface plot button
        document.getElementById("surfacePlotButton").addEventListener("click", function () {
            window.location.href = `/surface_plot?data=${JSON.stringify(tableData)}`;
        });

        // Event listener for the Save Button
        document.getElementById("saveButton").addEventListener("click", function () {
            const editedTableData = [];

            document.querySelectorAll("table tbody tr").forEach(row => {
                const rowData = [];
                row.querySelectorAll("td").forEach(cell => {
                    rowData.push(cell.innerText);
                });
                editedTableData.push(rowData);
            });

            tableData = editedTableData;
            
            // Show success message with animation
            const successMessage = document.createElement('div');
            successMessage.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-full opacity-0 transition-all duration-500';
            successMessage.textContent = 'Changes saved successfully!';
            document.body.appendChild(successMessage);
            
            // Animate in
            setTimeout(() => {
                successMessage.style.transform = 'translate(0)';
                successMessage.style.opacity = '1';
            }, 100);
            
            // Animate out
            setTimeout(() => {
                successMessage.style.transform = 'translate-y-full';
                successMessage.style.opacity = '0';
                setTimeout(() => successMessage.remove(), 500);
            }, 3000);
        });
    </script>
</body>

</html>
