<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting</title>
    <style>
        /* General body styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0a292e;
        }

        /* Container styling */
        .container {
            max-width: 400px;
            width: 100%;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Heading styling */
        h1 {
            font-size: 26px;
            color: #3700b3;
            margin-bottom: 20px;
        }

        /* Input field styling */
        .input-field {
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: white;
            color: #0a292e;
        }

        .input-field::placeholder {
            color: #888;
        }

        /* Button styling */
        .btn {
            background-color: #6200ea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #3700b3;
            transform: translateY(-2px);
        }

        /* Link styling */
        .link {
            color: #0b2c31;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            font-weight: bold;
        }

        .link:hover {
            text-decoration: underline;
            color: #6200ea;
        }

        /* Responsive styling */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            .btn {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join a Meeting</h1>
        <form action="{{ url_for('meet.join') }}" method="POST">
            <div>
                <label for="roomID">Enter Meeting ID:</label>
                <input type="text" name="roomID" class="input-field" required placeholder="Meeting ID"><br>
            </div>
            <input type="submit" class="btn" value="Join">
        </form>
        <a href="{{ url_for('meet.dashboard') }}" class="link">Back to Dashboard</a>
    </div>
</body>
</html>
