<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyme Generator AI</title>
 <style>
    body {
        font-family: Arial, sans-serif;
        background: url('https://i.pinimg.com/736x/91/d6/c3/91d6c34f09be871d2558bcca6fbc00a2.jpg') no-repeat center center fixed;
        background-size: cover;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        position: relative;
    }
    
    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        
        z-index: 1;
    }
    
    .container {
        position: relative;
        z-index: 2; /* Place the container above the transparent background */
        background-color: #8cf8ed;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        text-align: center;
    }
    
    h1 {
        color: #0b0b0b;
        margin-bottom: 1.5rem;
    }
    
    form {
        margin-bottom: 1.5rem;
    }
    
    label {
        display: block;
        margin-bottom: 0.5rem;
        color: #040404;
        font-weight: bold;
    }
    
    input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #0f0f0f;
        border-radius: 5px;
        margin-bottom: 1rem;
        box-sizing: border-box;
    }
    
    button {
        background-color: #eff86d;
        color: rgb(6, 6, 6);
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
    }
    
    button:hover {
        background-color: #faac6d;
    }
    
    #result {
        display: none;
        text-align: left;
    }
    
    #result h2 {
        margin-bottom: 0.5rem;
        color: #333;
    }
    
    #responseText {
        font-size: 1rem;
        color: #555;
        margin-bottom: 1rem;
    }
    
    audio {
        width: 100%;
    }
    </style>
    


</head>
<body>
    <div class="container">
        <h1>Rhyme Generator AI</h1>
        <form id="rhymeForm">
            <label for="user_input">Enter a word or phrase:</label>
            <input type="text" id="user_input" name="user_input" required>
            <button type="submit">Generate</button>
        </form>
        <div id="result">
            <h2>Response:</h2>
            <p id="responseText"></p>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
       $(document).ready(function(){
    $('#rhymeForm').on('submit', function(event){
        event.preventDefault();
        $.ajax({
            url: '/chat1',
            method: 'POST',
            data: $(this).serialize(),
            success: function(data) {
                $('#responseText').text(data.response);
                $('#audioPlayer').attr('src', `/play_audio/${data.audio}`);
                $('#audioPlayer')[0].load();
                $('#result').show();  // Show the result section once the audio is ready
            },
            error: function() {
                alert('An error occurred while generating the rhyme.');
            }
        });
    });
});

    </script>
</body>
</html>
